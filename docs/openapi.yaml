openapi: 3.0.0
info:
  title: OFROO API
  description: |
    OFROO Coupons & Offers API. **Mobile app** uses the same route shapes under base URL `/api/mobile` (e.g. `POST /api/mobile/auth/otp/request`).

    **Offer & coupon responses** include: `is_expired`, `is_not_started`, `effective_status`, `status_label_ar`, `status_label_en`.

    **Swagger UI:** open `/docs/swagger.html` on the app host (see `DocumentationController` / deployment notes).
  version: 1.1.0
  contact:
    name: OFROO Support
    email: support@ofroo.com

servers:
  - url: http://localhost:8000/api
    description: Local development server
  - url: https://api.ofroo.com/api
    description: Production server

tags:
  - name: Authentication
    description: User authentication endpoints
  - name: OTP
    description: Phone/email OTP (SMS/WhatsApp/log via OTP_PHONE_DRIVER)
  - name: Offers
    description: Public offers endpoints
  - name: Cart
    description: Shopping cart management
  - name: Orders
    description: Order management
  - name: Wallet
    description: User wallet and coupons
  - name: Merchant
    description: Merchant-specific endpoints
  - name: Admin
    description: Admin-only endpoints

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - phone
                - password
              properties:
                name:
                  type: string
                  example: Ahmed Ali
                email:
                  type: string
                  format: email
                  example: ahmed@example.com
                phone:
                  type: string
                  example: +201012345678
                password:
                  type: string
                  format: password
                  example: password123
                password_confirmation:
                  type: string
                  format: password
                  example: password123
                language:
                  type: string
                  enum: [ar, en]
                  example: ar
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: ahmed@example.com
                phone:
                  type: string
                  example: +201012345678
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string

  /auth/otp/request:
    post:
      tags:
        - OTP
      summary: Request OTP (sends to phone via queue or email)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [phone]
                  properties:
                    phone:
                      type: string
                      example: "+201234567890"
                - type: object
                  required: [email]
                  properties:
                    email:
                      type: string
                      format: email
      responses:
        '200':
          description: OTP queued/sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestResponse'
        '404':
          description: User not found
        '429':
          description: Resend cooldown

  /auth/otp/verify:
    post:
      tags:
        - OTP
      summary: Verify OTP and receive token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  example: "123456"
                phone:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerifyResponse'
        '400':
          description: Invalid or expired OTP

  /admin/merchants/{id}/commission:
    put:
      tags:
        - Admin
      summary: Update merchant commission rule (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [commission_mode]
              properties:
                commission_mode:
                  type: string
                  enum: [platform, custom, waived]
                commission_custom_percent:
                  type: number
                  format: float
                  description: Required when commission_mode is custom (0–100)
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantCommissionResponse'

  /offers:
    get:
      tags:
        - Offers
      summary: List offers
      parameters:
        - name: category
          in: query
          schema:
            type: integer
        - name: nearby
          in: query
          schema:
            type: boolean
        - name: lat
          in: query
          schema:
            type: number
            format: float
        - name: lng
          in: query
          schema:
            type: number
            format: float
        - name: distance
          in: query
          schema:
            type: integer
            description: Distance in meters
        - name: q
          in: query
          schema:
            type: string
            description: Search query
        - name: page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Offer'

  /offers/{id}:
    get:
      tags:
        - Offers
      summary: Get offer details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Offer details (wrapped in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Offer'

  /cart:
    get:
      tags:
        - Cart
      summary: Get user cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /cart/add:
    post:
      tags:
        - Cart
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - offer_id
                - quantity
              properties:
                offer_id:
                  type: integer
                quantity:
                  type: integer
      responses:
        '200':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartAddResponse'
        '400':
          description: Offer unavailable, expired, or stock exhausted
        '401':
          description: Unauthenticated

  /orders/checkout:
    post:
      tags:
        - Orders
      summary: Create order from cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method
                - cart_id
              properties:
                payment_method:
                  type: string
                  enum: [cash, card, none]
                cart_id:
                  type: integer
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: '#/components/schemas/Order'

  /wallet/coupons:
    get:
      tags:
        - Wallet
      summary: Get user coupons
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user coupons
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'

  /merchant/offers:
    post:
      tags:
        - Merchant
      summary: Create offer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title_ar
                - price
                - total_coupons
              properties:
                title_ar:
                  type: string
                title_en:
                  type: string
                description_ar:
                  type: string
                description_en:
                  type: string
                price:
                  type: number
                  format: float
                original_price:
                  type: number
                  format: float
                discount_percent:
                  type: integer
                total_coupons:
                  type: integer
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
                category_id:
                  type: integer
                location_id:
                  type: integer
      responses:
        '201':
          description: Offer created successfully

  /merchant/coupons/{id}/activate:
    post:
      tags:
        - Merchant
      summary: Activate coupon
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Coupon activated successfully

  /admin/reports/sales:
    get:
      tags:
        - Admin
      summary: Get sales report
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: merchant
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Sales report data

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        language:
          type: string
          enum: [ar, en]
        role:
          $ref: '#/components/schemas/Role'

    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        name_ar:
          type: string
        name_en:
          type: string

    Offer:
      type: object
      description: OfferResource shape (public & merchant lists)
      properties:
        id:
          type: integer
        title:
          type: string
        title_ar:
          type: string
        title_en:
          type: string
        description:
          type: string
        description_ar:
          type: string
        description_en:
          type: string
        merchant_id:
          type: string
        category_id:
          type: string
        mall_id:
          type: string
          nullable: true
        price:
          type: number
          format: float
        discount:
          type: number
          format: float
        offer_images:
          type: array
          items:
            type: string
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        location: {}
        status:
          type: string
          example: active
        is_expired:
          type: boolean
          description: true if status is expired or end_date is in the past
        is_not_started:
          type: boolean
        effective_status:
          type: string
          enum: [expired, not_started, active, disabled, pending]
        status_label_ar:
          type: string
          description: Human-readable; non-empty when expired or not started
        status_label_en:
          type: string
        is_favorite:
          type: boolean
        merchant:
          $ref: '#/components/schemas/Merchant'
        category:
          $ref: '#/components/schemas/Category'
        mall: {}
        branches:
          type: array
          items: {}
        coupons:
          type: array
          items:
            $ref: '#/components/schemas/Coupon'
        terms_conditions_ar:
          type: string
        terms_conditions_en:
          type: string
        created_at:
          type: string
          format: date-time

    Merchant:
      type: object
      properties:
        id:
          type: integer
        company_name:
          type: string
        company_name_ar:
          type: string
        company_name_en:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name_ar:
          type: string
        name_en:
          type: string

    Cart:
      type: object
      properties:
        id:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          format: float

    OfferInCart:
      type: object
      description: Nested offer in cart index response
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        discount:
          type: number
          format: float
        offer_images:
          type: array
          items:
            type: string
        status:
          type: string
        is_expired:
          type: boolean
        is_not_started:
          type: boolean
        effective_status:
          type: string
        merchant: {}
        category: {}

    CartItem:
      type: object
      properties:
        id:
          type: integer
        offer:
          $ref: '#/components/schemas/OfferInCart'
        coupon:
          $ref: '#/components/schemas/Coupon'
        quantity:
          type: integer
        price_at_add:
          type: number
          format: float

    Order:
      type: object
      properties:
        id:
          type: integer
        total_amount:
          type: number
          format: float
        payment_method:
          type: string
          enum: [cash, card, none]
        payment_status:
          type: string
          enum: [pending, paid, failed]
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        coupons:
          type: array
          items:
            $ref: '#/components/schemas/Coupon'

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        offer:
          $ref: '#/components/schemas/Offer'
        quantity:
          type: integer
        unit_price:
          type: number
          format: float
        total_price:
          type: number
          format: float

    Coupon:
      type: object
      description: CouponResource shape
      properties:
        id:
          type: integer
        offer_id:
          type: string
        image:
          type: string
        title:
          type: string
        title_ar:
          type: string
        title_en:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        price_after_discount:
          type: number
          format: float
        discount:
          type: number
          format: float
        discount_type:
          type: string
          enum: [percentage, fixed]
        barcode:
          type: string
        coupon_code:
          type: string
        barcode_value:
          type: string
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, inactive, used, activated, expired, cancelled, pending]
        is_expired:
          type: boolean
        is_not_started:
          type: boolean
        effective_status:
          type: string
        status_label_ar:
          type: string
        status_label_en:
          type: string
        usage_limit:
          type: integer
        usage_unlimited:
          type: boolean
        times_used:
          type: integer
        usage_remaining:
          type: integer
          nullable: true
        is_exhausted:
          type: boolean
        created_at:
          type: string
          format: date-time
        offer:
          type: object
          properties:
            id:
              type: integer
            title_ar:
              type: string
            title_en:
              type: string
            status:
              type: string
            start_date:
              type: string
              format: date-time
            end_date:
              type: string
              format: date-time
            is_expired:
              type: boolean
            is_not_started:
              type: boolean
            effective_status:
              type: string
        reserved_at:
          type: string
          format: date-time
        activated_at:
          type: string
          format: date-time
        used_at:
          type: string
          format: date-time

    OtpRequestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        message_ar:
          type: string
        message_en:
          type: string
        otp:
          type: string
          nullable: true
          description: Only when APP_DEBUG is true

    OtpVerifyResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    CartAddResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        message_ar:
          type: string
        message_en:
          type: string
        data:
          type: object
          properties:
            cart_id:
              type: integer
            offer_id:
              type: integer
            quantity_added:
              type: integer
            line_total_quantity:
              type: integer

    MerchantCommissionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        message_ar:
          type: string
        data:
          type: object
          properties:
            commission_mode:
              type: string
              enum: [platform, custom, waived]
            commission_custom_percent:
              type: number
              format: float
              nullable: true
            effective_commission_percent:
              type: number
              format: float
            platform_default_commission_percent:
              type: number
              format: float

